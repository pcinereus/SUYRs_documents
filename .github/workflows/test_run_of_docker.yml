name: Test run an R script in docker

on:
  workflow_dispatch:

jobs:
  run-r-script:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: read

    steps:
      - name: Pull Docker image
        run: |
          docker pull ghcr.io/pcinereus/suyrs_documents:latest

      - name: Run R script
        run: |
          docker run --rm ghcr.io/pcinereus/suyrs_documents:latest Rscript -e "print('Hello from R!')"
